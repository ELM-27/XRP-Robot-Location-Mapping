<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XRP Path Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    color: #c9d1d9;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
    gap: 20px;
  }

  h1 {
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #58a6ff;
    border-bottom: 1px solid #21262d;
    padding-bottom: 10px;
    width: 100%;
    max-width: 860px;
    text-align: center;
  }

  #drop-zone {
    width: 100%;
    max-width: 860px;
    border: 2px dashed #30363d;
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-size: 0.85rem;
    color: #8b949e;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: #58a6ff;
    background: #161b22;
    color: #c9d1d9;
  }
  #drop-zone input { display: none; }

  #stats {
    font-size: 0.75rem;
    color: #8b949e;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 860px;
  }
  #stats span { color: #e6edf3; }

  #canvas-wrap {
    position: relative;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }
  canvas { display: block; }

  #legend {
    display: none;
    gap: 20px;
    font-size: 0.75rem;
    color: #8b949e;
    flex-wrap: wrap;
    justify-content: center;
  }
  .leg { display: flex; align-items: center; gap: 6px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-line { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }
</style>
</head>
<body>

<h1>XRP Robot Path Map</h1>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept=".txt">
  Drop movement_log.txt here, or click to browse
</div>

<div id="stats">
  <div>Drive samples: <span id="st-drive">-</span></div>
  <div>Turns: <span id="st-turns">-</span></div>
  <div>Distance (est): <span id="st-dist">-</span> cm</div>
  <div>Scale: <span id="st-scale">-</span> px/cm</div>
</div>

<div id="canvas-wrap"><canvas id="canvas"></canvas></div>

<div id="legend">
  <div class="leg"><div class="leg-line" style="background:#4f9eff"></div> Robot path</div>
  <div class="leg"><div class="leg-dot" style="background:#3fb950"></div> Start</div>
  <div class="leg"><div class="leg-dot" style="background:#f78166"></div> End</div>
  <div class="leg"><div class="leg-dot" style="background:#d29922"></div> Turn point</div>
</div>

<script>
// -- Parse log ----------------------------------------------------------------
function parseLog(text) {
  const lines = text.trim().split('\n');
  const entries = [];
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    if (line.startsWith('Drive:')) {
      const yaw = parseFloat(line.slice(6).trim());
      if (!isNaN(yaw)) entries.push({ type: 'drive', yaw });
    } else if (line.startsWith('Turn:')) {
      const deg = parseFloat(line.slice(5).trim());
      if (!isNaN(deg)) entries.push({ type: 'turn', deg });
    } else if (line.startsWith('Reverse:')) {
      const rev = parseFloat(line.slice(8).trim());
      if (!isNaN(rev)) entries.push({ type: 'reverse', rev });
    }
  }
  return entries;
}

// -- Dead-reckon positions ----------------------------------------------------
// Each Drive entry = 20 ms forward at that yaw
// Speed calibration: match xrp_mapper.py SPEED_CM_PER_MS
const SPEED_CM_PER_MS = 0.030;
const YAW_INTERVAL_MS = 20;
const DIST_PER_DRIVE  = SPEED_CM_PER_MS * YAW_INTERVAL_MS; // cm per Drive sample

function buildPath(entries) {
  let x = 0, y = 0;
  const path  = [{ x, y }];   // continuous waypoints
  const turns = [];            // (x,y) of each turn point
  let currentYaw = 0;

  for (const e of entries) {
    if (e.type === 'drive') {
      currentYaw = e.yaw;
      const rad = (e.yaw * Math.PI) / 180;
      x += DIST_PER_DRIVE * Math.sin(rad);
      y += DIST_PER_DRIVE * Math.cos(rad);
      path.push({ x, y });
    } else if (e.type === 'turn') {
      turns.push({ x, y });
    } else if (e.type === 'reverse') {
      const returnDist = SPEED_CM_PER_MS * e.rev
      const rad = (currentYaw * Math.PI) / 180;
      x -= returnDist * Math.sin(rad);
      y -= returnDist * Math.cos(rad);
      path.push({ x, y });
    }
  }
  return { path, turns };
}

console.log("Finished analyzing file.")

// -- Draw ---------------------------------------------------------------------
function draw(path, turns) {
  const canvas = document.getElementById('canvas');
  const wrap   = document.getElementById('canvas-wrap');

  const MAX_W = Math.min(window.innerWidth - 48, 860);
  const MAX_H = Math.max(window.innerHeight * 0.6, 400);

  // Bounding box
  const xs = path.map(p => p.x);
  const ys = path.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);

  const spanX = maxX - minX || 1;
  const spanY = maxY - minY || 1;

  const MARGIN = 48;
  const scaleX = (MAX_W  - MARGIN * 2) / spanX;
  const scaleY = (MAX_H  - MARGIN * 2) / spanY;
  const scale  = Math.min(scaleX, scaleY, 8);   // cap at 8px/cm

  const W = Math.ceil(spanX * scale + MARGIN * 2);
  const H = Math.ceil(spanY * scale + MARGIN * 2);

  canvas.width  = W;
  canvas.height = H;
  wrap.style.display = 'block';
  document.getElementById('legend').style.display = 'flex';
  document.getElementById('st-scale').textContent = scale.toFixed(2);

  const ctx = canvas.getContext('2d');

  // to screen coords (flip Y so +Y = up)
  const sx = x => (x - minX) * scale + MARGIN;
  const sy = y => H - ((y - minY) * scale + MARGIN);

  // Background
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  // Grid (every 10 cm)
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  const gStartX = Math.floor(minX / 10) * 10;
  const gStartY = Math.floor(minY / 10) * 10;
  for (let gx = gStartX; gx <= maxX + 10; gx += 10) {
    const px = sx(gx);
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
  }
  for (let gy = gStartY; gy <= maxY + 10; gy += 10) {
    const py = sy(gy);
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
  }

  // Origin crosshair
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  const ox = sx(0), oy = sy(0);
  ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(W, oy); ctx.stroke();

  // Path
  ctx.beginPath();
  ctx.moveTo(sx(path[0].x), sy(path[0].y));
  for (let i = 1; i < path.length; i++) {
    ctx.lineTo(sx(path[i].x), sy(path[i].y));
  }
  ctx.strokeStyle = '#4f9eff';
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  ctx.stroke();

  // Turn points
  for (const t of turns) {
    ctx.beginPath();
    ctx.arc(sx(t.x), sy(t.y), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#d29922';
    ctx.fill();
  }

  // Start dot
  ctx.beginPath();
  ctx.arc(sx(path[0].x), sy(path[0].y), 7, 0, Math.PI * 2);
  ctx.fillStyle = '#3fb950';
  ctx.fill();
  ctx.fillStyle = '#0f1117';
  ctx.font = 'bold 9px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', sx(path[0].x), sy(path[0].y));

  // End dot
  const last = path[path.length - 1];
  ctx.beginPath();
  ctx.arc(sx(last.x), sy(last.y), 7, 0, Math.PI * 2);
  ctx.fillStyle = '#f78166';
  ctx.fill();
  ctx.fillStyle = '#0f1117';
  ctx.fillText('E', sx(last.x), sy(last.y));
}

// -- File handling ------------------------------------------------------------
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text    = e.target.result;
    const entries = parseLog(text);
    const drives  = entries.filter(e => e.type === 'drive').length;
    const turns   = entries.filter(e => e.type === 'turn').length;
    const distCm  = (drives * DIST_PER_DRIVE).toFixed(1);

    document.getElementById('st-drive').textContent = drives;
    document.getElementById('st-turns').textContent = turns;
    document.getElementById('st-dist').textContent  = distCm;

    const { path, turns: turnPts } = buildPath(entries);
    draw(path, turnPts);
  };
  reader.readAsText(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
